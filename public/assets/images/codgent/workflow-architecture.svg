<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Codgent document-based multi-agent workflow architecture</title>
  <desc id="desc">A target repository flows through planner, coder, reviewer and document writer roles, with validation gates, persistent documents, provider adapters and Git boundaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090a0d"/>
      <stop offset="0.62" stop-color="#10131a"/>
      <stop offset="1" stop-color="#0b1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8fb4ff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#7c8aa5" stroke-opacity="0.08"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#60718e"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="1320" cy="110" r="260" fill="#1d4ed8" opacity="0.08" filter="url(#glow)"/>

  <g font-family="Inter, Noto Sans SC, sans-serif">
    <text x="88" y="82" fill="#8fa5ca" font-family="JetBrains Mono, monospace" font-size="17" letter-spacing="4">CODGENT / WORKFLOW MVP</text>
    <text x="88" y="142" fill="#f2f5fb" font-size="46" font-weight="650">Document-based multi-agent coding workflow</text>
    <text x="88" y="182" fill="#8993a7" font-size="20">Durable handoffs · state-driven orchestration · validation gates · Git boundaries</text>

    <g transform="translate(88 248)">
      <rect width="220" height="196" rx="8" fill="#11151d" stroke="#344057"/>
      <text x="24" y="34" fill="#71809a" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2">TARGET REPO</text>
      <text x="24" y="78" fill="#e5e9f2" font-size="24" font-weight="600">Project context</text>
      <text x="24" y="112" fill="#91a0b8" font-size="16">roadmap.md</text>
      <text x="24" y="139" fill="#91a0b8" font-size="16">architecture.md</text>
      <text x="24" y="166" fill="#91a0b8" font-size="16">state.json</text>
    </g>

    <path d="M326 346H392" stroke="#60718e" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(410 246)">
      <g>
        <rect width="230" height="150" rx="8" fill="#121824" stroke="#5279bd"/>
        <text x="22" y="31" fill="#8fb4ff" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">01 / PLANNER</text>
        <text x="22" y="62" fill="#f1f4fa" font-size="22" font-weight="600">Define a</text>
        <text x="22" y="87" fill="#f1f4fa" font-size="22" font-weight="600">narrow task</text>
        <text x="22" y="113" fill="#8f9bb0" font-size="15">Context → plan.md</text>
        <rect x="22" y="130" width="88" height="3" fill="url(#accent)"/>
      </g>
      <g transform="translate(270 0)">
        <rect width="230" height="150" rx="8" fill="#121824" stroke="#5279bd"/>
        <text x="22" y="31" fill="#8fb4ff" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">02 / CODER</text>
        <text x="22" y="62" fill="#f1f4fa" font-size="22" font-weight="600">Implement</text>
        <text x="22" y="87" fill="#f1f4fa" font-size="22" font-weight="600">and verify</text>
        <text x="22" y="113" fill="#8f9bb0" font-size="15">plan.md → summary.md</text>
        <rect x="22" y="130" width="116" height="3" fill="url(#accent)"/>
      </g>
      <g transform="translate(540 0)">
        <rect width="230" height="150" rx="8" fill="#121824" stroke="#5279bd"/>
        <text x="22" y="31" fill="#8fb4ff" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">03 / REVIEWER</text>
        <text x="22" y="74" fill="#f1f4fa" font-size="22" font-weight="600">Gate the result</text>
        <text x="22" y="113" fill="#8f9bb0" font-size="15">Diff → review.md</text>
        <rect x="22" y="130" width="94" height="3" fill="url(#accent)"/>
      </g>
      <g transform="translate(810 0)">
        <rect width="230" height="150" rx="8" fill="#121824" stroke="#5279bd"/>
        <text x="22" y="31" fill="#8fb4ff" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">04 / DOC WRITER</text>
        <text x="22" y="62" fill="#f1f4fa" font-size="22" font-weight="600">Sync durable</text>
        <text x="22" y="87" fill="#f1f4fa" font-size="22" font-weight="600">context</text>
        <text x="22" y="113" fill="#8f9bb0" font-size="15">Approved → final.md</text>
        <rect x="22" y="130" width="126" height="3" fill="url(#accent)"/>
      </g>
      <path d="M236 75H262M506 75H532M776 75H802" stroke="#60718e" stroke-width="2" marker-end="url(#arrow)"/>
    </g>

    <g transform="translate(410 454)">
      <rect width="1040" height="104" rx="8" fill="#0e1118" stroke="#293348"/>
      <text x="24" y="34" fill="#6f7e96" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">ORCHESTRATOR / NON-AI CONTROL PLANE</text>
      <text x="24" y="72" fill="#dce3ef" font-size="19">Validate handoff → repair or pause → advance state → commit approved work</text>
      <text x="925" y="34" fill="#4ade80" font-family="JetBrains Mono, monospace" font-size="13">APPROVED</text>
      <text x="925" y="72" fill="#fbbf24" font-family="JetBrains Mono, monospace" font-size="13">NEEDS HUMAN</text>
    </g>

    <g transform="translate(88 620)">
      <rect width="470" height="184" rx="8" fill="#10141c" stroke="#2e394d"/>
      <text x="24" y="34" fill="#71809a" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">DURABLE ARTIFACTS</text>
      <text x="24" y="74" fill="#dce3ef" font-size="18">plan · summary · review · final · context sync</text>
      <text x="24" y="107" fill="#8f9bb0" font-size="16">events.jsonl · output.txt · current.json</text>
      <text x="24" y="140" fill="#8f9bb0" font-size="16">role sessions · models · task state · Git commit</text>
      <circle cx="27" cy="160" r="4" fill="#22d3ee"/>
      <text x="42" y="166" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="13">inspectable / resumable / recoverable</text>
    </g>

    <g transform="translate(590 620)">
      <rect width="520" height="184" rx="8" fill="#10141c" stroke="#2e394d"/>
      <text x="24" y="34" fill="#71809a" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">PROVIDER ADAPTERS</text>
      <text x="24" y="78" fill="#e6ebf4" font-size="20">Codex CLI</text>
      <text x="188" y="78" fill="#e6ebf4" font-size="20">Codex app-server</text>
      <text x="24" y="118" fill="#e6ebf4" font-size="20">OpenCode</text>
      <text x="188" y="118" fill="#e6ebf4" font-size="20">OpenCode session</text>
      <text x="24" y="158" fill="#e6ebf4" font-size="20">Claude stream</text>
      <text x="371" y="158" fill="#e6ebf4" font-size="20">Stub</text>
    </g>

    <g transform="translate(1142 620)">
      <rect width="308" height="184" rx="8" fill="#10141c" stroke="#2e394d"/>
      <text x="24" y="34" fill="#71809a" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">MVP AUDIT</text>
      <text x="24" y="83" fill="#8fb4ff" font-family="JetBrains Mono, monospace" font-size="40" font-weight="700">11/11</text>
      <text x="178" y="83" fill="#a1aabd" font-size="16">smoke tests</text>
      <text x="24" y="128" fill="#8fb4ff" font-family="JetBrains Mono, monospace" font-size="28">6</text>
      <text x="60" y="128" fill="#a1aabd" font-size="16">adapter modes</text>
      <text x="24" y="161" fill="#8fb4ff" font-family="JetBrains Mono, monospace" font-size="28">4</text>
      <text x="60" y="161" fill="#a1aabd" font-size="16">workflow roles</text>
    </g>
  </g>
</svg>
