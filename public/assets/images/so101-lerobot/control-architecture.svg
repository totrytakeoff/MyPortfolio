<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SO101 robot software control architecture</title>
  <desc id="desc">A six-stage flow from STS3215 hardware through the safety controller, ROS2, robot model, vision, and pick and place actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d11"/>
      <stop offset="0.55" stop-color="#10141a"/>
      <stop offset="1" stop-color="#0b1013"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#22d3ee" stop-opacity="0.025"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e4e4e7" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <g font-family="Inter, Noto Sans SC, sans-serif">
    <text x="64" y="74" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="15" letter-spacing="4">SO101 / CONTROL GRAPH</text>
    <text x="64" y="126" fill="#e4e4e7" font-size="38" font-weight="650" letter-spacing="-1.2">从真实关节状态到视觉引导抓取</text>
    <text x="64" y="165" fill="#a1a1aa" font-size="18">Hardware ownership, motion safety, ROS2 orchestration and explainable perception.</text>

    <g fill="none" stroke="url(#line)" stroke-width="2" marker-end="url(#arrow)">
      <path d="M286 450H298"/>
      <path d="M538 450H550"/>
      <path d="M790 450H802"/>
      <path d="M1042 450H1054"/>
      <path d="M1294 450H1306"/>
    </g>

    <g filter="url(#shadow)">
      <g transform="translate(54 274)">
        <rect width="230" height="352" rx="3" fill="#14181e" stroke="#2e353e"/>
        <rect x="1" y="1" width="228" height="5" fill="#22d3ee" opacity="0.75"/>
        <text x="22" y="45" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">01 / HARDWARE</text>
        <circle cx="46" cy="99" r="23" fill="#164e63" stroke="#22d3ee" stroke-opacity="0.6"/>
        <circle cx="46" cy="99" r="7" fill="none" stroke="#67e8f9" stroke-width="2"/>
        <path d="M46 76V86M46 112V122M23 99H33M59 99H69" stroke="#67e8f9" stroke-width="2"/>
        <text x="22" y="157" fill="#e4e4e7" font-size="21" font-weight="650">STS3215 总线</text>
        <text x="22" y="189" fill="#71717a" font-size="14">6 joints · 1 Mbps</text>
        <path d="M22 220H208" stroke="#2e353e"/>
        <text x="22" y="252" fill="#a1a1aa" font-size="14">• 位置标定与限位</text>
        <text x="22" y="282" fill="#a1a1aa" font-size="14">• 电压 / 温度 / 扭矩</text>
        <text x="22" y="312" fill="#a1a1aa" font-size="14">• 统一关节状态</text>
      </g>

      <g transform="translate(306 274)">
        <rect width="230" height="352" rx="3" fill="#14181e" stroke="#2e353e"/>
        <rect x="1" y="1" width="228" height="5" fill="#22d3ee" opacity="0.85"/>
        <text x="22" y="45" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">02 / SAFETY</text>
        <path d="M27 80H66V118H27Z" fill="#164e63" stroke="#22d3ee" stroke-opacity="0.65"/>
        <path d="M37 99L44 106L58 90" fill="none" stroke="#67e8f9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="22" y="157" fill="#e4e4e7" font-size="21" font-weight="650">持久控制器</text>
        <text x="22" y="189" fill="#71717a" font-size="14">10–60 Hz state loop</text>
        <path d="M22 220H208" stroke="#2e353e"/>
        <text x="22" y="252" fill="#a1a1aa" font-size="14">• 五次同步轨迹</text>
        <text x="22" y="282" fill="#a1a1aa" font-size="14">• Goal 抢占 / Stop</text>
        <text x="22" y="312" fill="#a1a1aa" font-size="14">• Fault hold / 恢复</text>
      </g>

      <g transform="translate(558 274)">
        <rect width="230" height="352" rx="3" fill="#14181e" stroke="#2e353e"/>
        <rect x="1" y="1" width="228" height="5" fill="#22d3ee" opacity="0.95"/>
        <text x="22" y="45" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">03 / ROS2</text>
        <circle cx="46" cy="99" r="23" fill="#18233a" stroke="#9aaed0" stroke-opacity="0.8"/>
        <circle cx="46" cy="99" r="8" fill="none" stroke="#bac8e3" stroke-width="2"/>
        <circle cx="46" cy="80" r="3" fill="#bac8e3"/>
        <circle cx="63" cy="108" r="3" fill="#bac8e3"/>
        <circle cx="29" cy="108" r="3" fill="#bac8e3"/>
        <text x="22" y="157" fill="#e4e4e7" font-size="21" font-weight="650">ROS2 Driver</text>
        <text x="22" y="189" fill="#71717a" font-size="14">State · Command · Action</text>
        <path d="M22 220H208" stroke="#2e353e"/>
        <text x="22" y="252" fill="#a1a1aa" font-size="14">• /joint_states</text>
        <text x="22" y="282" fill="#a1a1aa" font-size="14">• Service / Action</text>
        <text x="22" y="312" fill="#a1a1aa" font-size="14">• Bringup / Params</text>
      </g>

      <g transform="translate(810 274)">
        <rect width="230" height="352" rx="3" fill="#14181e" stroke="#2e353e"/>
        <rect x="1" y="1" width="228" height="5" fill="#22d3ee" opacity="0.9"/>
        <text x="22" y="45" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">04 / MODEL</text>
        <path d="M25 116L45 79L68 116Z" fill="#164e63" stroke="#67e8f9" stroke-width="2"/>
        <circle cx="45" cy="79" r="5" fill="#67e8f9"/>
        <circle cx="25" cy="116" r="5" fill="#67e8f9"/>
        <circle cx="68" cy="116" r="5" fill="#67e8f9"/>
        <text x="22" y="157" fill="#e4e4e7" font-size="21" font-weight="650">URDF / TF</text>
        <text x="22" y="189" fill="#71717a" font-size="14">RViz2 · MuJoCo</text>
        <path d="M22 220H208" stroke="#2e353e"/>
        <text x="22" y="252" fill="#a1a1aa" font-size="14">• 真实状态同步</text>
        <text x="22" y="282" fill="#a1a1aa" font-size="14">• 关节方向校验</text>
        <text x="22" y="312" fill="#a1a1aa" font-size="14">• 离线动作验证</text>
      </g>

      <g transform="translate(1062 274)">
        <rect width="230" height="352" rx="3" fill="#14181e" stroke="#2e353e"/>
        <rect x="1" y="1" width="228" height="5" fill="#22d3ee" opacity="0.8"/>
        <text x="22" y="45" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">05 / VISION</text>
        <rect x="23" y="80" width="48" height="38" rx="4" fill="#211a3d" stroke="#8b7cff" stroke-opacity="0.8"/>
        <circle cx="47" cy="99" r="11" fill="none" stroke="#b6aaff" stroke-width="2"/>
        <circle cx="47" cy="99" r="3" fill="#b6aaff"/>
        <text x="22" y="157" fill="#e4e4e7" font-size="21" font-weight="650">视觉定位</text>
        <text x="22" y="189" fill="#71717a" font-size="14">Pixel → Table → Base</text>
        <path d="M22 220H208" stroke="#2e353e"/>
        <text x="22" y="252" fill="#a1a1aa" font-size="14">• HSV / ArUco</text>
        <text x="22" y="282" fill="#a1a1aa" font-size="14">• Camera calibration</text>
        <text x="22" y="312" fill="#a1a1aa" font-size="14">• Homography / TF</text>
      </g>

      <g transform="translate(1314 274)">
        <rect width="230" height="352" rx="3" fill="#14181e" stroke="#365146"/>
        <rect x="1" y="1" width="228" height="5" fill="#4ade80" opacity="0.85"/>
        <text x="22" y="45" fill="#4ade80" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">06 / ACTION</text>
        <path d="M27 84V115M67 84V115M27 99H67" fill="none" stroke="#86efac" stroke-width="3" stroke-linecap="round"/>
        <path d="M37 90L47 99L57 90M37 108L47 99L57 108" fill="none" stroke="#86efac" stroke-width="2"/>
        <text x="22" y="157" fill="#e4e4e7" font-size="21" font-weight="650">Pick &amp; Place</text>
        <text x="22" y="189" fill="#71717a" font-size="14">IK · Primitives · Result</text>
        <path d="M22 220H208" stroke="#2e353e"/>
        <text x="22" y="252" fill="#a1a1aa" font-size="14">• Approach / Grasp</text>
        <text x="22" y="282" fill="#a1a1aa" font-size="14">• Lift / Place / Release</text>
        <text x="22" y="312" fill="#a1a1aa" font-size="14">• 可中断任务状态</text>
      </g>
    </g>

    <g transform="translate(64 694)">
      <text x="0" y="0" fill="#71717a" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">SHARED CONTRACTS</text>
      <g transform="translate(0 28)">
        <rect width="235" height="54" rx="2" fill="#12161b" stroke="#2e353e"/>
        <circle cx="25" cy="27" r="5" fill="#22d3ee"/>
        <text x="43" y="33" fill="#a1a1aa" font-size="14">Joint naming &amp; limits</text>
      </g>
      <g transform="translate(252 28)">
        <rect width="235" height="54" rx="2" fill="#12161b" stroke="#2e353e"/>
        <circle cx="25" cy="27" r="5" fill="#22d3ee"/>
        <text x="43" y="33" fill="#a1a1aa" font-size="14">Goal / fault semantics</text>
      </g>
      <g transform="translate(504 28)">
        <rect width="235" height="54" rx="2" fill="#12161b" stroke="#2e353e"/>
        <circle cx="25" cy="27" r="5" fill="#22d3ee"/>
        <text x="43" y="33" fill="#a1a1aa" font-size="14">Frame transforms</text>
      </g>
      <g transform="translate(756 28)">
        <rect width="235" height="54" rx="2" fill="#12161b" stroke="#2e353e"/>
        <circle cx="25" cy="27" r="5" fill="#22d3ee"/>
        <text x="43" y="33" fill="#a1a1aa" font-size="14">Observable actions</text>
      </g>
    </g>

    <g transform="translate(1288 706)">
      <rect width="256" height="82" rx="2" fill="#112019" stroke="#315542"/>
      <circle cx="27" cy="28" r="6" fill="#4ade80"/>
      <text x="45" y="34" fill="#86efac" font-family="JetBrains Mono, monospace" font-size="13">LOOP / VERIFIED</text>
      <text x="27" y="62" fill="#a1a1aa" font-size="13">sense → plan → act → observe</text>
    </g>
  </g>
</svg>
